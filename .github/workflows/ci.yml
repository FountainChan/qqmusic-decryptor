name: CI

on:
  push:
    branches: [master, main]
    tags: [v*]
  pull_request:
    branches: [master, main]

permissions:
  contents: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check src/

  install:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Verify CLI entry points
        env:
          PYTHONIOENCODING: utf-8
        run: |
          qqmusic-decrypt --help
          qqmusic-meta --help

  build:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: windows-latest
    needs: [lint, install]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build GUI executable
        run: pyinstaller build.spec

      - name: Package as zip
        run: |
          Compress-Archive -Path dist/QQMusicDecryptor -DestinationPath QQMusicDecryptor-windows-x64.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            --title "Release ${{ github.ref_name }}" `
            --notes "自动打包的 QQMusicDecryptor GUI 可执行文件。" 2>$null
          gh release upload "${{ github.ref_name }}" QQMusicDecryptor-windows-x64.zip --clobber

      - name: Upload artifact (branch build)
        if: ${{ ! startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: QQMusicDecryptor-windows-x64
          path: QQMusicDecryptor-windows-x64.zip
