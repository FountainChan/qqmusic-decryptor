[PATHS]
# GUI 默认路径（包含 VipSongsDownload 后缀）
input_dir = G:\QQMusic\Download\VipSongsDownload
output_dir = G:\QQMusic\Decrypted\VipSongsDownload

[LOGGING]
log_level = INFO
log_file = logs/decrypt.log
save_stats = true

[OPTIONS]
preserve_structure = true
skip_existing = true
max_retries = 3
retry_delay = 2
verify_metadata = true
# 删除功能配置
delete_source = true
delete_empty_dirs = true
delete_lyrics = true
# 元数据处理模式
# inline: 逐个文件处理（旧方式）
# batch: 批量处理（新方式，推荐）
metadata_processing_mode = batch
# 跳过解密时的元数据修改（在批量模式下应该为 true）
skip_metadata_during_decrypt = true

[NOTIFICATIONS]
show_completion = true
show_summary = true
